bundle:
  name: real-time-market-data-lakehouse
  databricks_cli_version: ">= 0.218.0"

variables:
  data_config_env:
    description: Configuration profile used by batch, live, silver, gold and reporting jobs.
    default: dev
  governed_config_env:
    description: Configuration profile used by governed pipeline runs and notebook dashboards.
    default: dev_governed
  app_config_env:
    description: Configuration profile used by the Streamlit app serving publisher and app runtime.
    default: dev_app
  app_serving_base_path:
    description: Unity Catalog volume path exposed to the Streamlit app.
    default: /Volumes/workspace/default/market_data_app/dev
  app_volume_name:
    description: Unity Catalog volume name used by app-facing serving datasets.
    default: market_data_app
  app_volume_catalog:
    description: Unity Catalog catalog name used by the app-facing volume.
    default: workspace
  app_volume_schema:
    description: Unity Catalog schema name used by the app-facing volume.
    default: default

include:
  - resources/volumes/market_data_app_volume.yml
  - resources/jobs/backfill_history.yml
  - resources/jobs/ingest_live_market.yml
  - resources/jobs/transform_silver.yml
  - resources/jobs/build_gold_metrics.yml
  - resources/jobs/data_quality_checks.yml
  - resources/jobs/quality_audit_report.yml
  - resources/jobs/market_observability_report.yml
  - resources/jobs/market_observability_dashboard_refresh.yml
  - resources/jobs/publish_app_serving_layer.yml
  - resources/jobs/debug_app_data_plane.yml
  - resources/jobs/market_data_medallion_pipeline.yml
  - resources/jobs/market_data_medallion_pipeline_governed.yml

targets:
  dev:
    default: true
    mode: development
    variables:
      data_config_env: dev
      governed_config_env: dev_governed
      app_config_env: dev_app
      app_serving_base_path: /Volumes/workspace/default/market_data_app/dev
      app_volume_name: market_data_app
      app_volume_catalog: workspace
      app_volume_schema: default
  staging:
    mode: development
    variables:
      data_config_env: staging
      governed_config_env: staging_governed
      app_config_env: staging_app
      app_serving_base_path: /Volumes/workspace/default/market_data_app_staging/staging
      app_volume_name: market_data_app_staging
      app_volume_catalog: workspace
      app_volume_schema: default
  azure_trial:
    mode: development
    variables:
      data_config_env: azure_trial
      governed_config_env: azure_trial_governed
      app_config_env: azure_trial_app
      app_serving_base_path: /Volumes/dbx_trial_marketdata/default/market_data_app_azure_trial/azure_trial
      app_volume_name: market_data_app_azure_trial
      app_volume_catalog: dbx_trial_marketdata
      app_volume_schema: default
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: ${workspace.current_user.userName}
    permissions:
      - level: CAN_MANAGE
        user_name: ${workspace.current_user.userName}
    variables:
      data_config_env: prod
      governed_config_env: prod_governed
      app_config_env: prod_app
      app_serving_base_path: /Volumes/workspace/default/market_data_app_prod/prod
      app_volume_name: market_data_app_prod
      app_volume_catalog: workspace
      app_volume_schema: default
