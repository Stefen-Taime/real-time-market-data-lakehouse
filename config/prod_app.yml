environment: prod_app
mode: production

catalog: workspace

workspace:
  target: prod

volume:
  catalog: workspace
  schema: default
  name: market_data_app_prod

serving_tables:
  catalog: workspace
  schema: default
  names:
    gold_latest_price: prod_app_gold_latest_price
    gold_volume_1m: prod_app_gold_volume_1m
    gold_volatility_5m: prod_app_gold_volatility_5m
    gold_top_movers: prod_app_gold_top_movers
    audit_quality_check_runs: prod_app_audit_quality_check_runs
    audit_processing_state: prod_app_audit_processing_state

paths:
  source_delta_base_path: dbfs:/tmp/real-time-market-data-lakehouse/prod
  delta_base_path: dbfs:/Volumes/workspace/default/market_data_app_prod/prod

databricks:
  register_tables: false
  table_format: delta
  write_modes:
    serving: overwrite

app:
  warehouse_id: 38144212fd15dd19
  query_mode: table
  volume_path: /Volumes/workspace/default/market_data_app_prod
  serving_base_path: /Volumes/workspace/default/market_data_app_prod/prod
  serving_catalog: workspace
  serving_schema: default
  serving_volume_history_hours: 24
  sql_insert_batch_size: 200
  default_limit: 25
  default_volume_hours: 6
  default_top_movers_limit: 10
