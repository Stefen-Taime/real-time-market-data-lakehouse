resources:
  jobs:
    market_observability_report:
      name: market_observability_report_${bundle.target}
      max_concurrent_runs: 1
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml
      tasks:
        - task_key: market_observability_report
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/07_market_observability_report.py
            base_parameters:
              env: ${var.data_config_env}
              limit: "20"
