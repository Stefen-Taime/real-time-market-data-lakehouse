resources:
  jobs:
    market_data_medallion_pipeline:
      name: market_data_medallion_pipeline_${bundle.target}
      max_concurrent_runs: 1
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
      environments:
        - environment_key: core
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml
        - environment_key: live
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml
              - websocket-client
      tasks:
        - task_key: backfill_history
          environment_key: core
          notebook_task:
            notebook_path: ../../notebooks/01_backfill_history.py
            base_parameters:
              env: dev
              write_silver: "false"
        - task_key: ingest_live_market
          depends_on:
            - task_key: backfill_history
          environment_key: live
          notebook_task:
            notebook_path: ../../notebooks/02_ingest_live_market.py
            base_parameters:
              env: dev
              source_mode: binance_ws
              stream_types: trade,kline
              kline_interval: "1m"
              max_messages: "200"
              duration_seconds: "60"
              write_silver: "false"
        - task_key: transform_silver
          depends_on:
            - task_key: ingest_live_market
          environment_key: core
          notebook_task:
            notebook_path: ../../notebooks/03_transform_silver.py
            base_parameters:
              env: dev
              write_mode: merge
              transform_trades: "true"
              transform_klines: "true"
        - task_key: build_gold_metrics
          depends_on:
            - task_key: transform_silver
          environment_key: core
          notebook_task:
            notebook_path: ../../notebooks/04_build_gold.py
            base_parameters:
              env: dev
              write_mode: merge
              volatility_window_size: "5"
              top_movers_limit: "10"
        - task_key: data_quality_checks
          depends_on:
            - task_key: build_gold_metrics
          environment_key: core
          notebook_task:
            notebook_path: ../../notebooks/05_data_quality_checks.py
            base_parameters:
              env: dev
              fail_on_error: "true"
              audit_run_id: "{{job.run_id}}"
              job_name: "{{job.name}}"
              task_name: "{{task.name}}"
        - task_key: publish_app_serving_layer
          depends_on:
            - task_key: data_quality_checks
          environment_key: core
          notebook_task:
            notebook_path: ../../notebooks/08_publish_app_serving_layer.py
            base_parameters:
              env: dev_app
