resources:
  jobs:
    debug_app_data_plane:
      name: debug_app_data_plane_${bundle.target}
      max_concurrent_runs: 1
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml
      tasks:
        - task_key: debug_app_data_plane
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/09_debug_app_data_plane.py
            base_parameters:
              env: dev_app
