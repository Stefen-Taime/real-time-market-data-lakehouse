resources:
  jobs:
    quality_audit_report:
      name: quality_audit_report_${bundle.target}
      max_concurrent_runs: 1
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml
      tasks:
        - task_key: quality_audit_report
          environment_key: default
          notebook_task:
            notebook_path: ../../notebooks/06_quality_audit_report.py
            base_parameters:
              env: dev
              limit: "20"
